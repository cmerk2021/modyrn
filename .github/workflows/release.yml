name: Release

# Fully automated release pipeline.
# Bump `version.txt` and push to `main`. Everything else is automatic:
#   test -> tag -> GitHub Release -> multi-arch Docker build -> publish to GHCR.

on:
  push:
    branches: [main]
    paths:
      - 'version.txt'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '20.11.0'
  REGISTRY: ghcr.io

jobs:
  guard:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version.txt
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < version.txt)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists; skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Verify build
    needs: guard
    if: needs.guard.outputs.changed == 'true'
    uses: ./.github/workflows/ci.yml

  tag-and-release:
    name: Tag & GitHub Release
    needs: [guard, test]
    if: needs.guard.outputs.changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.guard.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          VERSION="${{ needs.guard.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.guard.outputs.version }}
          name: Modyrn v${{ needs.guard.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false

  docker:
    name: Build & publish images
    needs: [guard, tag-and-release]
    if: needs.guard.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, bot, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.app }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.guard.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.guard.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.guard.outputs.version }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.app }}.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            APP_VERSION=${{ needs.guard.outputs.version }}
