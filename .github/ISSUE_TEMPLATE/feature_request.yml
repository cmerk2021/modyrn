name: Feature request
description: Suggest an idea for Modyrn
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is it for?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: complexity
    attributes:
      label: Which complexity mode does this target?
      options:
        - Simple
        - Advanced
        - Expert
        - All
    validations:
      required: true
